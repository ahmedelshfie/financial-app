server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${APP_RATE_LIMIT_REPLENISH_RATE:10}
            redis-rate-limiter.burstCapacity: ${APP_RATE_LIMIT_BURST_CAPACITY:20}
            redis-rate-limiter.requestedTokens: ${APP_RATE_LIMIT_REQUESTED_TOKENS:1}
            key-resolver: "#{@remoteAddressKeyResolver}"
        - name: CircuitBreaker
          args:
            name: gatewayCircuitBreaker
            fallbackUri: forward:/fallback
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates: [ Path=/api/auth/** ]
            - id: admin-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates: [ Path=/api/admin/** ]
            - id: customer-service
              uri: ${CUSTOMER_SERVICE_URL:http://localhost:8082}
              predicates: [ Path=/api/customers/** ]
            - id: account-service
              uri: ${ACCOUNT_SERVICE_URL:http://localhost:8083}
              predicates: [ Path=/api/accounts/** ]
            - id: transaction-service
              uri: ${TRANSACTION_SERVICE_URL:http://localhost:8084}
              predicates: [ Path=/api/transactions/** ]
            - id: transfer-service
              uri: ${TRANSFER_SERVICE_URL:http://localhost:8085}
              predicates: [ Path=/api/transfers/** ]
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
              predicates: [ Path=/api/payments/** ]
            - id: report-service
              uri: ${REPORT_SERVICE_URL:http://localhost:8087}
              predicates: [ Path=/api/reports/** ]
            - id: dashboard-service
              uri: ${DASHBOARD_SERVICE_URL:http://localhost:8088}
              predicates: [ Path=/api/dashboard/** ]

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-me-dev-only-change-me-123456}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}

spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.example.finance: DEBUG
