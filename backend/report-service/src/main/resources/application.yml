server:
  port: ${SERVER_PORT:8087}
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/report_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-me-dev-only-change-me-123456}
  services:
    account-url: ${ACCOUNT_SERVICE_URL:http://localhost:8083}
    transaction-url: ${TRANSACTION_SERVICE_URL:http://localhost:8084}
    transfer-url: ${TRANSFER_SERVICE_URL:http://localhost:8085}
    payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
